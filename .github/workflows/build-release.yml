name: Build Release

on:
  workflow_call:
    inputs:
      ref:
        type: string
        default: ''
      channel:
        type: string
        default: ''
      version:
        type: string
        default: ''
      notify:
        type: boolean
        default: true
      run-stage:
        type: boolean
        default: false
      build-snap:
        type: boolean
        description: Build Snap package (Linux)
        default: false

  workflow_dispatch:
    inputs:
      bump:
        type: choice
        description: Bump version
        default: '-'
        options:
          - '-'
          - prerelease
          - patch
          - minor
          - major
      channel:
        type: choice
        description: Select the channel
        default: nightly
        options:
          - nightly
          - internal
          - production
        required: true
      upgrade-key:
        description: Value for package.json upgrade field
        required: false
      run-stage:
        type: boolean
        description: Stage the build
        default: false
      notify:
        type: boolean
        description: Notify to Slack
        default: true
      build-snap:
        type: boolean
        description: Build Snap package (Linux)
        default: false

env:
  CHANNEL: ${{ inputs.channel || github.event.inputs.channel || 'nightly' }}

jobs:
  bump-version:
    if: ${{ github.event.inputs.bump != '' && github.event.inputs.bump != '-' }}
    permissions:
      contents: write
      packages: read
    uses: ./.github/workflows/bump-version-release.yml
    secrets: inherit
    with:
      version-type: ${{ github.event.inputs.bump }}

  build-linux-x64:
    needs: bump-version
    if: ${{ !cancelled() && !failure() }}
    permissions:
      contents: write # to upload artifacts
      packages: read
    runs-on: ubuntu-latest
    environment: release
    outputs:
      artifact-links: ${{ steps.build.outputs.artifact-links }}
    env:
      BUILD_SNAP: ${{ inputs.build-snap || github.event.inputs['build-snap'] || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}
      - uses: holepunchto/actions/make-pear-app@v1
        id: build
        with:
          channel: ${{ env.CHANNEL }}
          linux_set_up_snapcraft: ${{ env.BUILD_SNAP }}
          upgrade_key: >-
            ${{ github.event.inputs['upgrade-key']
              || ((inputs.channel || github.event.inputs.channel) == 'nightly' && secrets.NIGHTLY_KEY)
              || ((inputs.channel || github.event.inputs.channel) == 'internal' && secrets.INTERNAL_KEY) }}

  build-linux-arm:
    needs: bump-version
    if: ${{ !cancelled() && !failure() }}
    permissions:
      contents: write
      packages: read
    runs-on: ubuntu-24.04-arm
    environment: release
    outputs:
      artifact-links: ${{ steps.build.outputs.artifact-links }}
    env:
      BUILD_SNAP: ${{ inputs.build-snap || github.event.inputs['build-snap'] || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}
      - uses: holepunchto/actions/make-pear-app@v1
        id: build
        with:
          channel: ${{ env.CHANNEL }}
          linux_set_up_snapcraft: ${{ env.BUILD_SNAP }}
          upgrade_key: >-
            ${{ github.event.inputs['upgrade-key']
              || ((inputs.channel || github.event.inputs.channel) == 'nightly' && secrets.NIGHTLY_KEY)
              || ((inputs.channel || github.event.inputs.channel) == 'internal' && secrets.INTERNAL_KEY) }}

  build-macos:
    needs: bump-version
    if: ${{ !cancelled() && !failure() }}
    permissions:
      contents: write
      packages: read
    runs-on: macos-latest
    environment: release
    outputs:
      artifact-links: ${{ steps.build.outputs.artifact-links }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}
      - uses: holepunchto/actions/make-pear-app@v1
        id: build
        with:
          channel: ${{ env.CHANNEL }}
          upgrade_key: >-
            ${{ github.event.inputs['upgrade-key']
              || ((inputs.channel || github.event.inputs.channel) == 'nightly' && secrets.NIGHTLY_KEY)
              || ((inputs.channel || github.event.inputs.channel) == 'internal' && secrets.INTERNAL_KEY) }}
          macos_certificate_base64: ${{ secrets.CERTIFICATE_P12 }}
          macos_p12_password: ${{ secrets.CERTIFICATE_PASSWORD }}
          macos_codesign_identity: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          macos_notarization_method: apple_id_password
          macos_apple_id: ${{ secrets.APPLE_ID }}
          macos_apple_password: ${{ secrets.APPLE_PASSWORD }}
          macos_apple_team_id: ${{ secrets.APPLE_TEAM_ID }}

  build-macos-x64:
    needs: bump-version
    if: ${{ !cancelled() && !failure() }}
    permissions:
      contents: write
      packages: read
    runs-on: macos-26-intel
    environment: release
    outputs:
      artifact-links: ${{ steps.build.outputs.artifact-links }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}
      - uses: holepunchto/actions/make-pear-app@v1
        id: build
        with:
          channel: ${{ env.CHANNEL }}
          upgrade_key: >-
            ${{ github.event.inputs['upgrade-key']
              || ((inputs.channel || github.event.inputs.channel) == 'nightly' && secrets.NIGHTLY_KEY)
              || ((inputs.channel || github.event.inputs.channel) == 'internal' && secrets.INTERNAL_KEY) }}
          macos_certificate_base64: ${{ secrets.CERTIFICATE_P12 }}
          macos_p12_password: ${{ secrets.CERTIFICATE_PASSWORD }}
          macos_codesign_identity: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          macos_notarization_method: apple_id_password
          macos_apple_id: ${{ secrets.APPLE_ID }}
          macos_apple_password: ${{ secrets.APPLE_PASSWORD }}
          macos_apple_team_id: ${{ secrets.APPLE_TEAM_ID }}

  build-win32:
    needs: bump-version
    if: ${{ !cancelled() && !failure() }}
    permissions:
      contents: write
      packages: read
    runs-on: windows-signer
    environment: release
    outputs:
      artifact-links: ${{ steps.build.outputs.artifact-links }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}
      - uses: holepunchto/actions/make-pear-app@v1
        id: build
        with:
          channel: ${{ env.CHANNEL }}
          upgrade_key: >-
            ${{ github.event.inputs['upgrade-key']
              || ((inputs.channel || github.event.inputs.channel) == 'nightly' && secrets.NIGHTLY_KEY)
              || ((inputs.channel || github.event.inputs.channel) == 'internal' && secrets.INTERNAL_KEY) }}
          windows_signing_method: windows_cert_sha1
          windows_cert_sha1: ${{ secrets.WINDOWS_CERT_SHA1 }}

  stage:
    needs:
      [bump-version, build-linux-x64, build-linux-arm, build-macos, build-macos-x64, build-win32]
    if: >-
      ${{ !cancelled()
        && (inputs.run-stage == true || github.event.inputs['run-stage'] == 'true')
        && needs.build-linux-x64.result == 'success'
        && needs.build-linux-arm.result == 'success'
        && needs.build-macos.result == 'success'
        && needs.build-macos-x64.result == 'success'
        && needs.build-win32.result == 'success' }}
    permissions:
      contents: write
      packages: read
      actions: read
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      - uses: actions/download-artifact@v4
        with:
          path: out/artifacts

      - name: Build stage artifact
        env:
          CHANNEL: ${{ env.CHANNEL }}
          BUILD_VERSION: ${{ inputs.version }}
        run: |
          ./scripts/build-stage-artifact.sh out/artifacts out/pear-stage

      - uses: holepunchto/actions/pear-ci@v1
        with:
          namespace: ${{ env.CHANNEL }}-v4
          primary-key: ${{ secrets.PEAR_PRIMARY_KEY }}
          target: './out/pear-stage'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs:
      [
        bump-version,
        build-linux-x64,
        build-linux-arm,
        build-macos,
        build-macos-x64,
        build-win32,
        stage
      ]
    if: ${{ !cancelled() && always() && inputs.notify }}
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    environment: release
    env:
      UPGRADE_KEY: >-
        ${{ github.event.inputs['upgrade-key']
          || ((inputs.channel || github.event.inputs.channel) == 'nightly' && secrets.NIGHTLY_KEY)
          || ((inputs.channel || github.event.inputs.channel) == 'internal' && secrets.INTERNAL_KEY) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || needs.bump-version.outputs.sha || github.sha }}
          fetch-depth: 0

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://npm.pkg.github.com'
          scope: '@holepunchto'

      - name: Build Message
        id: message
        env:
          CHANNEL: ${{ env.CHANNEL }}
          UPGRADE_KEY: ${{ env.UPGRADE_KEY }}
          BUILD_LINUX_X64_RESULT: ${{ needs.build-linux-x64.result }}
          BUILD_LINUX_ARM_RESULT: ${{ needs.build-linux-arm.result }}
          BUILD_MACOS_RESULT: ${{ needs.build-macos.result }}
          BUILD_MACOS_X64_RESULT: ${{ needs.build-macos-x64.result }}
          BUILD_WINDOWS_RESULT: ${{ needs.build-win32.result }}
          BUILD_LINUX_X64_ARTIFACT_LINKS: ${{ needs.build-linux-x64.outputs.artifact-links }}
          BUILD_LINUX_ARM_ARTIFACT_LINKS: ${{ needs.build-linux-arm.outputs.artifact-links }}
          BUILD_MACOS_ARTIFACT_LINKS: ${{ needs.build-macos.outputs.artifact-links }}
          BUILD_MACOS_X64_ARTIFACT_LINKS: ${{ needs.build-macos-x64.outputs.artifact-links }}
          BUILD_WINDOWS_ARTIFACT_LINKS: ${{ needs.build-win32.outputs.artifact-links }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          emoji=":pear:"
          case "$CHANNEL" in
            nightly) emoji=":experimental-bird:" ;;
            internal) emoji=":internal-bird:" ;;
            production) emoji=":pear:" ;;
          esac

          format_result() {
            local result="$1"
            local artifact="$2"
            if [[ "$result" == "success" ]]; then
              echo "$artifact"
            else
              echo "failed"
            fi
          }

          linux_x64=$(format_result "$BUILD_LINUX_X64_RESULT" "$BUILD_LINUX_X64_ARTIFACT_LINKS")
          linux_arm=$(format_result "$BUILD_LINUX_ARM_RESULT" "$BUILD_LINUX_ARM_ARTIFACT_LINKS")
          macos=$(format_result "$BUILD_MACOS_RESULT" "$BUILD_MACOS_ARTIFACT_LINKS")
          macos_x64=$(format_result "$BUILD_MACOS_X64_RESULT" "$BUILD_MACOS_X64_ARTIFACT_LINKS")
          windows=$(format_result "$BUILD_WINDOWS_RESULT" "$BUILD_WINDOWS_ARTIFACT_LINKS")

          if [[ "$BUILD_LINUX_X64_RESULT" == "success" && "$BUILD_LINUX_ARM_RESULT" == "success" && "$BUILD_MACOS_RESULT" == "success" && "$BUILD_MACOS_X64_RESULT" == "success" && "$BUILD_WINDOWS_RESULT" == "success" ]]; then
            printf -v message '%s New pear platform `%s` build ready\n\nUpgrade key: `%s`\n\n:linux: %s\n:linux: %s\n:apple-mac: %s\n:apple-mac: %s\n:windows: %s' \
              "$emoji" \
              "$CHANNEL" \
              "$UPGRADE_KEY" \
              "$linux_x64" \
              "$linux_arm" \
              "$macos" \
              "$macos_x64" \
              "$windows"
          else
            printf -v message ':ga-failed: New pear platform `%s` build failed\n\nUpgrade key: `%s`\n\n:linux: %s\n:linux: %s\n:apple-mac: %s\n:apple-mac: %s\n:windows: %s\n\n%s' \
              "$CHANNEL" \
              "$UPGRADE_KEY" \
              "$linux_x64" \
              "$linux_arm" \
              "$macos" \
              "$macos_x64" \
              "$windows" \
              "$RUN_URL"
          fi

          {
            echo "message<<EOF"
            echo "$message"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve previous tag
        id: previous_tag
        run: |
          tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$tag" >> $GITHUB_OUTPUT

      - name: Slack Notification
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_MESSAGE: ${{ steps.message.outputs.message }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.tag }}
        run: |
          npm install -g bare @holepunchto/ci-tooling

          ARGS=(slack
            --token "$SLACK_TOKEN"
            --channel "$SLACK_CHANNEL_ID"
            --message "$SLACK_MESSAGE"
            --deps "$(ci deps --list pear-runtime-updater,pear-updater,pear-cmd)"
            --dups "$(ci dups)"
          )

          if [ -n "$PREVIOUS_TAG" ]; then
            ARGS+=(--changelog "$(ci changelog --from "$PREVIOUS_TAG" --slack)")
          fi

          ci "${ARGS[@]}"
